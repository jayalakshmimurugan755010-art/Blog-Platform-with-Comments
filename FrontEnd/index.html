<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Platform Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        
        <div id="navBar" class="nav hidden">
            <span>Logged in as: <strong id="userDisplay"></strong></span>
            <button onclick="logout()">Logout</button>
        </div>

        <div id="authSection" class="card">
            <h2>Blog Space Authentication</h2>
            <div class="form-group"><label>Username</label><input type="text" id="username" placeholder="Enter username"></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Enter password"></div>
            <button onclick="login()">Sign In</button>
            <button onclick="register()" style="background-color: #2ecc71;">Create Account</button>
        </div>

        <div id="blogSection" class="hidden">
            <div class="card">
                <h2>Create a New Blog Post</h2>
                <div class="form-group"><label>Title</label><input type="text" id="postTitle" placeholder="Post heading..."></div>
                <div class="form-group"><label>Content</label><textarea id="postContent" placeholder="Write your thoughts here..."></textarea></div>
                <button onclick="createPost()">Publish Post</button>
            </div>

            <h2>Recent Articles & Feed</h2>
            <div id="blogFeed"></div>
        </div>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
